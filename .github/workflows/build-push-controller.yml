name: Build & Push Controller

on:
  push:
    branches:
      - v1.8.0-mod

jobs:
  build-and-push-controller:
    name: Build and Push Controller Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute branch image tag
        id: branch-tag
        shell: bash
        run: |
          # github.ref_name is the branch or tag name that triggered the workflow
          ref_name="${GITHUB_REF_NAME}"
          # Docker tag rules are stricter than git refs; normalize to a safe tag.
          tag="$(echo "${ref_name}" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g; s#^-+##; s#-+$##')"
          # Fallback just in case normalization produces empty string
          if [[ -z "${tag}" ]]; then
            tag="unknown-branch"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Compute Lowercase Repo
        id: compute-repo
        run: |
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=$repo_lower" >> $GITHUB_OUTPUT

      - name: Compute image refs
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          image_repo="ghcr.io/${{ steps.compute-repo.outputs.repo_lower }}/controller"
          echo "image_repo=${image_repo}" >> "$GITHUB_OUTPUT"
          echo "img_branch=${image_repo}:${{ steps.branch-tag.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Build controller image
        env:
          VERSION: ${{ steps.branch-tag.outputs.tag }}
          IMG: ${{ steps.vars.outputs.img_branch }}
        run: make docker-controller-build

      - name: Push controller image
        run: docker push "${{ steps.vars.outputs.img_branch }}"
